<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Puzzle</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

    :root {
      --bg:       #0e0e12;
      --surface:  #17171f;
      --border:   #2a2a38;
      --accent:   #7c6dff;
      --accent2:  #ff6d8a;
      --text:     #e8e8f0;
      --muted:    #666680;
      --plus-bg:  #1a2a1a;
      --plus-fg:  #6dffb0;
      --minus-bg: #2a1a1a;
      --minus-fg: #ff6d6d;
      --cell-bg:  #1c1c28;
      --cell-hover: #24243a;
      --cell-active: #2e2e50;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      max-width: 420px;
      width: 100%;
    }

    header {
      text-align: center;
    }

    h1 {
      font-family: 'Space Mono', monospace;
      font-size: 1.4rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text);
    }

    .subtitle {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.4rem;
      line-height: 1.5;
    }

    /* MODE TOGGLE */
    .mode-bar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .mode-label {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #modeBtn {
      font-family: 'Space Mono', monospace;
      font-size: 1.5rem;
      font-weight: 700;
      width: 3rem;
      height: 3rem;
      border-radius: 50%;
      border: 2px solid;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.1s;
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
      background: var(--plus-bg);
      color: var(--plus-fg);
      border-color: var(--plus-fg);
    }

    #modeBtn:hover { transform: scale(1.08); }
    #modeBtn.minus {
      background: var(--minus-bg);
      color: var(--minus-fg);
      border-color: var(--minus-fg);
    }

    .mode-desc {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* GRID */
    .grid-container {
      position: relative;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    .cell {
      font-family: 'Space Mono', monospace;
      font-size: 1.6rem;
      font-weight: 700;
      width: 100px;
      height: 100px;
      background: var(--cell-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text);
      transition: background 0.12s, border-color 0.12s, transform 0.1s, color 0.2s;
      user-select: none;
      position: relative;
      overflow: hidden;
    }

    .cell::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      opacity: 0;
      transition: opacity 0.15s;
      pointer-events: none;
    }

    .cell:hover {
      background: var(--cell-hover);
      border-color: var(--accent);
      transform: scale(1.04);
    }

    .cell:active {
      background: var(--cell-active);
      transform: scale(0.97);
    }

    /* highlight the affected cells briefly */
    .cell.flash-add {
      background: #1a2e1a;
      border-color: var(--plus-fg);
      color: var(--plus-fg);
    }

    .cell.flash-sub {
      background: #2e1a1a;
      border-color: var(--minus-fg);
      color: var(--minus-fg);
    }

    .cell.flash-origin {
      border-color: var(--accent);
      background: #1e1e38;
    }

    /* undo highlight — stays visible until dismissed */
    @keyframes undoPulse {
      0%   { box-shadow: 0 0 0 0px rgba(255, 200, 80, 0.7); }
      60%  { box-shadow: 0 0 0 7px rgba(255, 200, 80, 0); }
      100% { box-shadow: 0 0 0 0px rgba(255, 200, 80, 0); }
    }

    .cell.undo-highlight {
      border-color: #ffc850 !important;
      background: #2a2210 !important;
      animation: undoPulse 0.55s ease-out;
    }

    .cell.negative {
      color: #ff6d6d;
    }

    /* CONTROLS */
    .controls {
      display: flex;
      gap: 0.75rem;
    }

    .btn {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.55rem 1.2rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }

    .btn:hover {
      background: var(--cell-hover);
      color: var(--text);
      border-color: var(--accent);
    }

    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .btn:disabled:hover {
      background: var(--surface);
      color: var(--muted);
      border-color: var(--border);
    }

    /* MOVE COUNTER */
    .info-row {
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-family: 'Space Mono', monospace;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-label {
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* ripple */
    @keyframes ripple {
      from { transform: scale(0); opacity: 0.4; }
      to   { transform: scale(2.5); opacity: 0; }
    }

    .ripple-dot {
      position: absolute;
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--accent);
      transform: scale(0);
      animation: ripple 0.4s ease-out forwards;
      pointer-events: none;
    }

    /* undo toast */
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes toastOut {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(-6px); }
    }

    #undoToast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid var(--accent);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.82rem;
      padding: 0.5rem 1.1rem;
      border-radius: 8px;
      pointer-events: none;
      white-space: nowrap;
      display: none;
      z-index: 100;
    }

    #undoToast .toast-val {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      color: var(--accent);
    }

    #undoToast.show {
      display: block;
      animation: toastIn 0.18s ease-out forwards;
    }

    #undoToast.hide {
      animation: toastOut 0.22s ease-in forwards;
    }
  </style>
</head>
<body>
<div class="wrapper">
  <header>
    <h1>Grid Ripple</h1>
    <p class="subtitle">Click a cell to ripple its value<br>across its row and column.</p>
  </header>

  <div class="mode-bar">
    <span class="mode-label">Mode</span>
    <button id="modeBtn" title="Toggle + / −">+</button>
    <span class="mode-desc" id="modeDesc">adds value</span>
  </div>

  <div class="grid-container">
    <div class="grid" id="grid"></div>
  </div>

  <div class="info-row">
    <div class="stat">
      <div class="stat-value" id="moveStat">0</div>
      <div class="stat-label">Moves</div>
    </div>
    <div class="controls">
      <button class="btn" id="undoBtn" disabled>↩ Undo</button>
      <button class="btn" id="resetBtn">↺ Reset</button>
    </div>
  </div>
</div>

<div id="undoToast"></div>

<script>
  const SIZE = 3;
  const INITIAL = Array.from({ length: SIZE * SIZE }, () => 1);

  let grid = [...INITIAL];
  let mode = '+'; // '+' or '-'
  let history = []; // stack of grid snapshots
  let moveCount = 0;

  const gridEl   = document.getElementById('grid');
  const modeBtn  = document.getElementById('modeBtn');
  const modeDesc = document.getElementById('modeDesc');
  const undoBtn  = document.getElementById('undoBtn');
  const resetBtn = document.getElementById('resetBtn');
  const moveStat = document.getElementById('moveStat');

  // Build cells
  const cells = [];
  for (let i = 0; i < SIZE * SIZE; i++) {
    const cell = document.createElement('button');
    cell.className = 'cell';
    cell.addEventListener('click', () => onCellClick(i));
    gridEl.appendChild(cell);
    cells.push(cell);
  }

  function render() {
    cells.forEach((cell, i) => {
      const v = grid[i];
      cell.textContent = v;
      cell.classList.toggle('negative', v < 0);
    });
    moveStat.textContent = moveCount;
    undoBtn.disabled = history.length === 0;
  }

  function getRowCol(idx) {
    return { row: Math.floor(idx / SIZE), col: idx % SIZE };
  }

  let undoHighlightTimer = null;

  function clearUndoHighlight() {
    cells.forEach(c => c.classList.remove('undo-highlight'));
    clearTimeout(undoHighlightTimer);
  }

  function onCellClick(idx) {
    clearUndoHighlight();
    // Save snapshot — also record which cell was pressed and its value at time of click
    history.push({ grid: [...grid], moveCount, clickedIdx: idx, clickedVal: grid[idx], clickedMode: mode });

    const val = grid[idx];
    const { row, col } = getRowCol(idx);
    const delta = mode === '+' ? val : -val;

    const affected = [];

    for (let c = 0; c < SIZE; c++) {
      if (c !== col) {
        const target = row * SIZE + c;
        grid[target] += delta;
        affected.push(target);
      }
    }
    for (let r = 0; r < SIZE; r++) {
      if (r !== row) {
        const target = r * SIZE + col;
        grid[target] += delta;
        affected.push(target);
      }
    }

    moveCount++;
    render();
    flashCells(idx, affected, mode);
  }

  function flashCells(origin, affected, m) {
    const addCls = m === '+' ? 'flash-add' : 'flash-sub';

    cells[origin].classList.add('flash-origin');
    affected.forEach(i => cells[i].classList.add(addCls));

    // ripple dot on origin
    const dot = document.createElement('div');
    dot.className = 'ripple-dot';
    cells[origin].appendChild(dot);
    setTimeout(() => dot.remove(), 450);

    setTimeout(() => {
      cells[origin].classList.remove('flash-origin');
      affected.forEach(i => cells[i].classList.remove(addCls));
    }, 350);
  }

  modeBtn.addEventListener('click', () => {
    mode = mode === '+' ? '-' : '+';
    modeBtn.textContent = mode;
    modeBtn.classList.toggle('minus', mode === '-');
    modeDesc.textContent = mode === '+' ? 'adds value' : 'subtracts value';
  });

  const toastEl = document.getElementById('undoToast');
  let toastTimer = null;

  function showUndoToast(val, idx, m) {
    const { row, col } = getRowCol(idx);
    const sign = m === '+' ? '+' : '−';
    toastEl.innerHTML = `Undid <span class="toast-val">${sign}${val}</span> at row ${row + 1}, col ${col + 1}`;

    // clear any running animation/timer
    clearTimeout(toastTimer);
    toastEl.classList.remove('show', 'hide');
    void toastEl.offsetWidth; // reflow to restart animation
    toastEl.classList.add('show');

    toastTimer = setTimeout(() => {
      toastEl.classList.remove('show');
      toastEl.classList.add('hide');
      setTimeout(() => toastEl.classList.remove('hide'), 250);
    }, 2200);
  }

  undoBtn.addEventListener('click', () => {
    if (history.length === 0) return;
    const snap = history.pop();
    grid = snap.grid;
    moveCount = snap.moveCount;
    render();
    showUndoToast(snap.clickedVal, snap.clickedIdx, snap.clickedMode);

    // Highlight the cell that was pressed
    clearUndoHighlight();
    cells[snap.clickedIdx].classList.add('undo-highlight');
    undoHighlightTimer = setTimeout(() => {
      cells[snap.clickedIdx].classList.remove('undo-highlight');
    }, 2200);
  });

  resetBtn.addEventListener('click', () => {
    grid = [...INITIAL];
    history = [];
    moveCount = 0;
    render();
  });

  render();
</script>
</body>
</html>
