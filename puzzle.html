<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arrow Rotation Puzzle</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #141414;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 4px;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 13px;
      color: #ffffff;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    /* Container to prevent layout shifting */
    .banner-container {
      height: 38px;
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .win-banner {
      font-size: 15px;
      font-weight: 500;
      color: #166534;
      background: #dcfce7;
      border: 1px solid #86efac;
      border-radius: 8px;
      padding: 8px 20px;
      display: none;
    }

    .hint-banner {
      font-size: 13px;
      color: #92400e;
      background: #fef3c7;
      border: 1px solid #fcd34d;
      border-radius: 8px;
      padding: 7px 16px;
      display: none;
      text-align: center;
    }

    .puzzle-container {
      position: relative;
      width: 360px;
      height: 360px;
      margin-bottom: 1.5rem;
    }

    .board {
      position: absolute;
      top: 60px;
      left: 60px;
      width: 240px;
      height: 240px;
    }

    .cell {
      position: absolute;
      background: #3784ff;
      border: 1.5px solid #e0ddd8;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      user-select: none;
      will-change: transform;
    }

    /* Rotation buttons */
    .rot-btn {
      position: absolute;
      width: 36px;
      height: 36px;
      border: 1.5px solid #d1cfc9;
      border-radius: 8px;
      background: #fff;
      color: #555;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: background 0.12s, border-color 0.12s, color 0.12s, box-shadow 0.2s;
      z-index: 10;
    }

    .rot-btn:hover {
      background: #f0ede8;
      border-color: #999;
      color: #111;
    }

    .rot-btn:active {
      transform: scale(0.93);
    }

    .rot-btn:disabled {
      opacity: 0.4;
      cursor: default;
      pointer-events: none;
    }

    .rot-btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      display: block;
    }

    /* Hint highlight: golden pulse on the recommended button */
    .rot-btn.hint-highlight {
      border-color: #d97706;
      background: #fffbeb;
      color: #92400e;
      box-shadow: 0 0 0 3px #fcd34d, 0 0 0 5px #fef3c7;
      animation: hint-pulse 1.1s ease-in-out infinite;
    }

    @keyframes hint-pulse {
      0%, 100% { box-shadow: 0 0 0 3px #fcd34d, 0 0 0 5px #fef3c7; }
      50%       { box-shadow: 0 0 0 5px #f59e0b, 0 0 0 9px #fef3c7; }
    }

    /* Bottom controls */
    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .ctrl-btn {
      padding: 9px 16px;
      font-size: 14px;
      font-family: inherit;
      border: 1.5px solid #c5c2bc;
      border-radius: 8px;
      background: #fff;
      color: #1a1a18;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s, transform 0.1s;
      outline: none;
    }

    select.ctrl-btn {
      padding: 8px 12px;
    }

    .ctrl-btn:hover {
      background: #f0ede8;
      border-color: #999;
    }

    .ctrl-btn:active {
      transform: scale(0.97);
    }

    .ctrl-btn:disabled {
      opacity: 0.45;
      cursor: default;
      pointer-events: none;
    }

    #hintBtn {
      border-color: #fcd34d;
      background: #fffbeb;
      color: #92400e;
    }

    #hintBtn:hover {
      background: #fef3c7;
      border-color: #f59e0b;
    }

    .move-count {
      font-size: 13px;
      color: #888;
      min-width: 70px;
      text-align: center;
    }
  </style>
</head>
<body>

<h1>Arrow Rotation Puzzle</h1>
<p class="subtitle" id="subtitleText">Rotate any 2×2 corner to make all arrows point up.</p>

<div class="banner-container">
  <div class="win-banner" id="winBanner">🎉 Solved! All arrows point up!</div>
  <div class="hint-banner" id="hintBanner"></div>
</div>

<div class="puzzle-container" id="puzzleContainer">
  <div class="board" id="board"></div>
</div>

<div class="controls">
  <select class="ctrl-btn" id="sizeSelect" onchange="changeSize()">
    <option value="3" selected>3 × 3</option>
    <option value="4">4 × 4</option>
    <option value="5">5 × 5</option>
    <option value="6">6 × 6</option>
    <option value="7">7 × 7</option>
    <option value="8">8 × 8</option>
    <option value="9">9 × 9</option>
  </select>
  <button class="ctrl-btn" id="scrambleBtn" onclick="scramble()">Scramble</button>
  <button class="ctrl-btn" id="resetBtn" onclick="reset()">Reset</button>
  <button class="ctrl-btn" id="hintBtn" onclick="showBestMove()">Best move</button>
  <span class="move-count" id="moveCount">Moves: 0</span>
</div>

<script>
  // ── State & Config ───────────────────────────────────────────
  const DIRS = ['↑', '→', '↓', '←'];
  let N = 3;
  let state = [];
  let moves = 0;
  let animating = false;

  let CORNERS = [];
  let TRANSITIONS = []; // Precomputed logic for instant BFS solving

  // ── Grid geometry ────────────────────────────────────────────
  const BOARD_SIZE = 240;
  let GAP, CELL, STEP, boardOffset;

  function updateGeometry() {
    GAP = N <= 4 ? 6 : N <= 6 ? 4 : 2;
    CELL = Math.floor((BOARD_SIZE - (N - 1) * GAP) / N);
    STEP = CELL + GAP;
    const actualWidth = CELL * N + GAP * (N - 1);
    boardOffset = (BOARD_SIZE - actualWidth) / 2; // Perfectly center it
  }

  function cellPos(idx) {
    return {
      x: boardOffset + (idx % N) * STEP,
      y: boardOffset + Math.floor(idx / N) * STEP
    };
  }

  function cornerCenter(cells) {
    const ps = cells.map(cellPos);
    return {
      cx: (Math.min(...ps.map(p => p.x)) + Math.max(...ps.map(p => p.x)) + CELL) / 2,
      cy: (Math.min(...ps.map(p => p.y)) + Math.max(...ps.map(p => p.y)) + CELL) / 2,
    };
  }

  // ── Setup & Precomputation ───────────────────────────────────
  function buildCorners() {
    const S = N - 1; // Corner rotation sizes
    const cornerDefs = [
      { name: 'TL', startRow: 0, startCol: 0 },
      { name: 'TR', startRow: 0, startCol: 1 },
      { name: 'BL', startRow: 1, startCol: 0 },
      { name: 'BR', startRow: 1, startCol: 1 }
    ];

    CORNERS = cornerDefs.map(c => {
      const cells = [];
      for(let r = 0; r < S; r++) {
        for(let col = 0; col < S; col++) {
          cells.push((c.startRow + r) * N + (c.startCol + col));
        }
      }
      return { ...c, cells, S };
    });
  }

  function buildTransitions() {
    TRANSITIONS = [];
    for(let ci = 0; ci < 4; ci++) {
      for(const cw of [true, false]) {
        const perm = new Array(N*N).fill(0).map((_, i) => i);
        const adds = new Array(N*N).fill(0);
        
        const corner = CORNERS[ci];
        const S = corner.S;
        const localToGlobal = (r, c) => (corner.startRow + r) * N + (corner.startCol + c);

        for(let r = 0; r < S; r++) {
          for(let c = 0; c < S; c++) {
            const gNew = localToGlobal(r, c);
            const gOld = cw ? localToGlobal(S - 1 - c, r) : localToGlobal(c, S - 1 - r);
            perm[gNew] = gOld;
            adds[gNew] = cw ? 1 : 3;
          }
        }
        TRANSITIONS.push({ ci, cw, perm, adds });
      }
    }
  }

  function applyStateRotation(ci, cw) {
    const t = TRANSITIONS.find(tr => tr.ci === ci && tr.cw === cw);
    const next = new Array(N*N);
    for(let i = 0; i < N*N; i++) {
      next[i] = (state[t.perm[i]] + t.adds[i]) & 3; // bitwise AND instead of mod 4
    }
    state = next;
  }

  // ── BFS Solver ──────────────────────────────────────────────
  function encode(st) {
    let n = 0n;
    for (let i = 0; i < st.length; i++) n = (n << 2n) | BigInt(st[i]);
    return n;
  }

  const SOLVED_CODE = 0n;

  function bfsSolve(startState) {
    const startCode = encode(startState);
    if (startCode === SOLVED_CODE) return null;

    const visited = new Map();
    visited.set(startCode, null);

    const queue = [[startState, startCode]];
    let head = 0;
    let nodes = 0;
    const MAX_NODES = 25000000000000000000000000000000; // Protection against browser freezing on big boards

    while (head < queue.length) {
      const [st, code] = queue[head++];
      
      if (++nodes > MAX_NODES) return "timeout";

      for (const t of TRANSITIONS) {
        const next = new Array(N*N);
        for(let i=0; i<N*N; i++) {
          next[i] = (st[t.perm[i]] + t.adds[i]) & 3;
        }
        const nc = encode(next);

        if (visited.has(nc)) continue;
        visited.set(nc, { cornerIdx: t.ci, cw: t.cw, parentCode: code });

        if (nc === SOLVED_CODE) {
          let entry = visited.get(nc);
          while (entry.parentCode !== startCode) {
            entry = visited.get(entry.parentCode);
          }
          let depth = 0, cur = nc;
          while (cur !== startCode) {
            cur = visited.get(cur).parentCode;
            depth++;
          }
          return { cornerIdx: entry.cornerIdx, cw: entry.cw, depth };
        }
        queue.push([next, nc]);
      }
    }
    return null;
  }

  // ── Hint UI ──────────────────────────────────────────────────
  let hintBtnId = null;

  function clearHint() {
    if (hintBtnId) {
      const el = document.getElementById(hintBtnId);
      if (el) el.classList.remove('hint-highlight');
      hintBtnId = null;
    }
    document.getElementById('hintBanner').style.display = 'none';
  }

  function showBestMove() {
    if (animating) return;
    clearHint();

    if (state.every(v => v === 0)) {
      document.getElementById('hintBanner').textContent = 'Already solved!';
      document.getElementById('hintBanner').style.display = 'block';
      return;
    }

    document.getElementById('hintBtn').textContent = 'Solving…';
    document.getElementById('hintBtn').disabled = true;

    setTimeout(() => {
      const result = bfsSolve(state);
      document.getElementById('hintBtn').textContent = 'Best move';
      document.getElementById('hintBtn').disabled = false;

      if (result === "timeout") {
        document.getElementById('hintBanner').textContent = 'Board is too scrambled! Make a few manual moves first.';
        document.getElementById('hintBanner').style.display = 'block';
        return;
      }

      if (!result) {
        document.getElementById('hintBanner').textContent = 'Already solved!';
        document.getElementById('hintBanner').style.display = 'block';
        return;
      }

      const { cornerIdx, cw, depth } = result;
      const id = `btn-${cornerIdx}-${cw ? 'cw' : 'ccw'}`;
      const el = document.getElementById(id);
      if (el) {
        el.classList.add('hint-highlight');
        hintBtnId = id;
      }

      const moveWord = depth === 1 ? 'move' : 'moves';
      const cornerName = ['top-left', 'top-right', 'bottom-left', 'bottom-right'][cornerIdx];
      const dirName = cw ? 'clockwise' : 'counter-clockwise';
      document.getElementById('hintBanner').textContent =
        `Best move: rotate ${cornerName} corner ${dirName} — solves in ${depth} ${moveWord}`;
      document.getElementById('hintBanner').style.display = 'block';
    }, 20);
  }

  // ── Animation ────────────────────────────────────────────────
  const ANIM_MS = 320;

  function animateRotation(cornerIdx, cw, onDone) {
    const { cells } = CORNERS[cornerIdx];
    const { cx, cy } = cornerCenter(cells);
    const targetAngle = cw ? 90 : -90;

    const cellEls = cells.map(i => document.getElementById('cell-' + i));
    cellEls.forEach(el => {
      const originX = cx - parseFloat(el.style.left);
      const originY = cy - parseFloat(el.style.top);
      el.style.transformOrigin = `${originX}px ${originY}px`;
      el.style.zIndex = '5';
      el.style.transition = 'none';
      el.style.transform = 'rotate(0deg)';
    });

    cellEls[0].getBoundingClientRect();

    cellEls.forEach(el => {
      el.style.transition = `transform ${ANIM_MS}ms cubic-bezier(0.4, 0, 0.2, 1)`;
      el.style.transform = `rotate(${targetAngle}deg)`;
    });

    setTimeout(() => {
      applyStateRotation(cornerIdx, cw);
      renderCells();
      onDone();
    }, ANIM_MS);
  }

  function applyRotation(cornerIdx, cw) {
    if (animating) return;
    animating = true;
    clearHint();
    setButtonsDisabled(true);

    animateRotation(cornerIdx, cw, () => {
      moves++;
      document.getElementById('moveCount').textContent = 'Moves: ' + moves;
      animating = false;
      setButtonsDisabled(false);
      checkWin();
    });
  }

  function setButtonsDisabled(disabled) {
    document.querySelectorAll('.rot-btn').forEach(b => b.disabled = disabled);
    document.getElementById('sizeSelect').disabled = disabled;
  }

  // ── Render ───────────────────────────────────────────────────
  function renderCells() {
    for (let i = 0; i < N*N; i++) {
      const el = document.getElementById('cell-' + i);
      const { x, y } = cellPos(i);
      el.style.left = x + 'px';
      el.style.top  = y + 'px';
      el.style.transform = 'none';
      el.style.transition = 'none';
      el.style.transformOrigin = 'center center';
      el.style.zIndex = '1';
      el.textContent = DIRS[state[i]];
    }
  }

  function checkWin() {
    if (state.every(v => v === 0)) {
      clearHint();
      document.getElementById('winBanner').style.display = 'block';
    }
  }

  // ── Start & Scramble ──────────────────────────────────────────
  function scramble() {
    if (animating) return;
    clearHint();
    state = Array(N*N).fill(0);
    // Bigger boards can get too chaotic for short BFS, keep scramble length reasonable
    for (let i = 0; i < 40; i++) {
      applyStateRotation(Math.floor(Math.random() * 4), Math.random() < 0.5);
    }
    moves = 0;
    document.getElementById('moveCount').textContent = 'Moves: 0';
    document.getElementById('winBanner').style.display = 'none';
    renderCells();
  }

  function reset() {
    if (animating) return;
    clearHint();
    state = Array(N*N).fill(0);
    moves = 0;
    document.getElementById('moveCount').textContent = 'Moves: 0';
    document.getElementById('winBanner').style.display = 'none';
    renderCells();
  }

  function changeSize() {
    if (animating) return;
    N = parseInt(document.getElementById('sizeSelect').value, 10);
    
    document.getElementById('subtitleText').textContent = `Rotate any ${(N-1)}×${(N-1)} corner to make all arrows point up.`;
    
    initBoard();
    scramble();
  }

  // ── Build DOM ─────────────────────────────────────────────────
  function makeSVG(paths) {
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('viewBox', '0 0 24 24');
    svg.innerHTML = paths;
    return svg;
  }
  function iconCW() { return makeSVG(`<path d="M21 12a9 9 0 1 1-9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/>`); }
  function iconCCW() { return makeSVG(`<path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>`); }

  const container = document.getElementById('puzzleContainer');
  const cornerNames = ['Top-left', 'Top-right', 'Bottom-left', 'Bottom-right'];
  const btnPositions = [
    { cw: { x: 12, y: 60  }, ccw: { x: 12, y: 100 } }, // TL
    { cw: { x: 312, y: 60 }, ccw: { x: 312, y: 100 } }, // TR
    { cw: { x: 12, y: 220 }, ccw: { x: 12, y: 260 } },  // BL
    { cw: { x: 312, y: 220 }, ccw: { x: 312, y: 260 } }, // BR
  ];

  btnPositions.forEach((pos, ci) => {
    const bCW = document.createElement('button');
    bCW.className = 'rot-btn';
    bCW.id = `btn-${ci}-cw`;
    bCW.title = cornerNames[ci] + ' — rotate clockwise';
    bCW.style.left = pos.cw.x + 'px';
    bCW.style.top  = pos.cw.y + 'px';
    bCW.appendChild(iconCW());
    bCW.addEventListener('click', () => applyRotation(ci, true));
    container.appendChild(bCW);

    const bCCW = document.createElement('button');
    bCCW.className = 'rot-btn';
    bCCW.id = `btn-${ci}-ccw`;
    bCCW.title = cornerNames[ci] + ' — rotate counter-clockwise';
    bCCW.style.left = pos.ccw.x + 'px';
    bCCW.style.top  = pos.ccw.y + 'px';
    bCCW.appendChild(iconCCW());
    bCCW.addEventListener('click', () => applyRotation(ci, false));
    container.appendChild(bCCW);
  });

  function initBoard() {
    updateGeometry();
    buildCorners();
    buildTransitions();
    state = Array(N*N).fill(0);
    
    const board = document.getElementById('board');
    board.innerHTML = '';
    
    for (let i = 0; i < N*N; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.id = 'cell-' + i;
      cell.style.width = CELL + 'px';
      cell.style.height = CELL + 'px';
      cell.style.fontSize = Math.max(12, CELL * 0.45) + 'px';
      cell.style.borderRadius = Math.max(4, CELL * 0.15) + 'px';
      board.appendChild(cell);
    }
    renderCells();
    moves = 0;
    document.getElementById('moveCount').textContent = 'Moves: 0';
    document.getElementById('winBanner').style.display = 'none';
  }

  // Init completely on load
  initBoard();
  scramble();
</script>
</body>
</html>
